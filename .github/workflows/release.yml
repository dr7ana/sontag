name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package
        run: |
          TAG=${GITHUB_REF_NAME}
          for dir in artifacts/sontag-*; do
            NAME=$(basename "$dir")
            PLATFORM=${NAME#sontag-}
            ARCHIVE="sontag-${TAG}-${PLATFORM}.tar.gz"
            chmod +x "${dir}/sontag"
            cp README.md "${dir}/"
            tar -czf "${ARCHIVE}" -C "${dir}" .
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: sontag-*.tar.gz
